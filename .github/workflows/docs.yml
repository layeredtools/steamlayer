name: Docs
on:
  push:
    branches: [main]
    paths:
      - "packages/core/src/**"
      - "docs/**"
      
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups
        
      - name: Deploy docs
        run: uv run mkdocs gh-deploy --force