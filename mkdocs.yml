site_name: SteamLayer
repo_url: https://github.com/layeredtools/steamlayer
theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: ["packages/core/src"]
          options:
            docstring_style: numpy
            show_source: true

nav:
  - Home: index.md
  - steamlayer-core:
    - API Reference:
      - Client: core/api/client.md
      - Models: core/api/models.md
      - Exceptions: core/api/exceptions.md
      - Events: core/api/events.md
