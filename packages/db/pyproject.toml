[project]
name = "steamlayer-db"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "sqlmodel>=0.0.21",
    "aiosqlite>=0.20",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
sources = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/steamlayer_db"]
